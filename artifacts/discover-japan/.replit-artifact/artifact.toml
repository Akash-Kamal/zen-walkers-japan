kind = "web"
previewPath = "/"
title = "Discover Japan"
version = "1.0.0"
id = "artifacts/discover-japan"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 18474
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/discover-japan run dev"

[services.env]
PORT = "18474"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/discover-japan", "run", "build"]
publicDir = "artifacts/discover-japan/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
