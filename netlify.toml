[build]
  base = "discover-japan"
  command = "pnpm install --no-frozen-lockfile && npm run build"
  publish = "discover-japan/dist/public"

[build.environment]
  BASE_PATH = "/"
  PNPM_FLAGS = "--no-frozen-lockfile"
  NPM_CONFIG_PRODUCTION = "false"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
