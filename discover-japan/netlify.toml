[build]
  command = "pnpm install --no-frozen-lockfile && BASE_PATH=/ npm run build"
  publish = "dist/public"

[build.environment]
  BASE_PATH = "/"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[context.production.environment]
  NODE_ENV = "production"

[context.deploy-preview.environment]
  NODE_ENV = "staging"

[context.branch-deploy.environment]
  NODE_ENV = "development"

[dev]
  command = "PORT=5173 BASE_PATH=/ npm run dev"
  port = 5173
